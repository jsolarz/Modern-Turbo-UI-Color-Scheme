name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  validate:
    name: Validate Theme Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install JSONC-friendly validator
        run: pip install --disable-pip-version-check commentjson

      # VS Code themes and some configs use JSONC (// and /* */ comments). stdlib json rejects those.
      - name: Validate JSON / JSONC files
        run: |
          echo "Validating .json files (JSON with optional comments)..."
          python3 << 'PY'
          import os
          import sys
          import commentjson

          skip_dirs = {".git", "node_modules"}
          errors = []
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if d not in skip_dirs]
              for name in files:
                  if not name.endswith(".json"):
                      continue
                  path = os.path.join(root, name)
                  try:
                      with open(path, encoding="utf-8") as f:
                          commentjson.load(f)
                  except Exception as e:
                      errors.append(f"{path}: {e}")
          if errors:
              print("\n".join(errors), file=sys.stderr)
              sys.exit(1)
          print("OK")
          PY
      
      - name: Validate XML files
        run: |
          echo "Validating XML files..."
          if command -v xmllint &> /dev/null; then
            find . -name "*.xml" -o -name "*.tmTheme" -o -name "*.icls" -o -name "*.vssettings" | while read file; do
              echo "Checking $file"
              xmllint --noout "$file" || exit 1
            done
          else
            echo "xmllint not available, skipping XML validation"
          fi
      
      - name: Check file structure
        run: |
          echo "Checking repository structure..."
          [ -d "vscode" ] || exit 1
          [ -d "jetbrains" ] || exit 1
          [ -d "vim" ] || exit 1
          [ -d "sublime-text" ] || exit 1
          [ -d "atom" ] || exit 1
          [ -d "emacs" ] || exit 1
          [ -d "linux-terminal" ] || exit 1
          [ -d "windows-terminal" ] || exit 1
          echo "✓ All required directories present"
